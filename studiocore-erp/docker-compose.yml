version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: studiocore-postgres
    environment:
      POSTGRES_DB: studiocore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - studiocore_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d studiocore']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: studiocore-redis
    ports:
      - '6379:6379'
    volumes:
      - studiocore_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: studiocore-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - studiocore_minio:/data

volumes:
  studiocore_postgres:
  studiocore_redis:
  studiocore_minio:
