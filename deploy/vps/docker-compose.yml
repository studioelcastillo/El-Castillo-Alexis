services:
  frontend-pruebas:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VITE_DASHBOARD_BASE: /
        DASHBOARD_APP_URL: /
        VITE_SUPABASE_URL: ${PRUEBAS_VITE_SUPABASE_URL:?missing PRUEBAS_VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${PRUEBAS_VITE_SUPABASE_ANON_KEY:?missing PRUEBAS_VITE_SUPABASE_ANON_KEY}
        VITE_API_URL: ${PRUEBAS_VITE_API_URL:-/api}
        API_URL: ${PRUEBAS_API_URL:-/api}
    container_name: castillo-frontend-pruebas
    restart: unless-stopped
    depends_on:
      - backend-pruebas
    ports:
      - "127.0.0.1:4100:80"

  backend-pruebas:
    build:
      context: ../../backend-legacy
      dockerfile: Dockerfile
    container_name: castillo-backend-pruebas
    env_file:
      - ../../.secure/backend-legacy.pruebas.env.local
    environment:
      APP_ENV: staging
      APP_DEBUG: "false"
      APP_URL: https://pruebas.livstre.com
      APP_SERVER: https://pruebas.livstre.com/
      CORS_ALLOWED_ORIGINS: https://pruebas.livstre.com
    restart: unless-stopped
    ports:
      - "127.0.0.1:4101:80"

  frontend-terminado:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VITE_DASHBOARD_BASE: /
        DASHBOARD_APP_URL: /
        VITE_SUPABASE_URL: ${TERMINADO_VITE_SUPABASE_URL:?missing TERMINADO_VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${TERMINADO_VITE_SUPABASE_ANON_KEY:?missing TERMINADO_VITE_SUPABASE_ANON_KEY}
        VITE_API_URL: ${TERMINADO_VITE_API_URL:-/api}
        API_URL: ${TERMINADO_API_URL:-/api}
    container_name: castillo-frontend-terminado
    restart: unless-stopped
    depends_on:
      - backend-terminado
    ports:
      - "127.0.0.1:4200:80"

  backend-terminado:
    build:
      context: ../../backend-legacy
      dockerfile: Dockerfile
    container_name: castillo-backend-terminado
    env_file:
      - ../../.secure/backend-legacy.terminado.env.local
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://terminado.livstre.com
      APP_SERVER: https://terminado.livstre.com/
      CORS_ALLOWED_ORIGINS: https://terminado.livstre.com
    restart: unless-stopped
    ports:
      - "127.0.0.1:4201:80"
