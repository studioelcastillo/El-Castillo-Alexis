services:
  studiocore-api-pruebas:
    build:
      context: ../../studiocore-erp
      dockerfile: apps/api/Dockerfile
    container_name: studiocore-api-pruebas
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4102
      API_GLOBAL_PREFIX: ${STUDIOCORE_STAGING_API_GLOBAL_PREFIX:-api/v1}
      API_DOCS_PATH: ${STUDIOCORE_STAGING_API_DOCS_PATH:-docs}
      DATABASE_URL: ${STUDIOCORE_STAGING_DATABASE_URL:?missing STUDIOCORE_STAGING_DATABASE_URL}
      DATABASE_SCHEMA: ${STUDIOCORE_STAGING_DATABASE_SCHEMA:-studiocore_erp}
      REDIS_URL: ${STUDIOCORE_STAGING_REDIS_URL:-redis://localhost:6379}
      JWT_ACCESS_SECRET: ${STUDIOCORE_STAGING_JWT_ACCESS_SECRET:?missing STUDIOCORE_STAGING_JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${STUDIOCORE_STAGING_JWT_REFRESH_SECRET:?missing STUDIOCORE_STAGING_JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${STUDIOCORE_STAGING_JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${STUDIOCORE_STAGING_JWT_REFRESH_TTL:-7d}
      S3_ENDPOINT: ${STUDIOCORE_STAGING_S3_ENDPOINT:-}
      S3_REGION: ${STUDIOCORE_STAGING_S3_REGION:-us-east-1}
      S3_BUCKET: ${STUDIOCORE_STAGING_S3_BUCKET:-el-castillo}
      S3_ACCESS_KEY: ${STUDIOCORE_STAGING_S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${STUDIOCORE_STAGING_S3_SECRET_KEY:-}
      S3_FORCE_PATH_STYLE: ${STUDIOCORE_STAGING_S3_FORCE_PATH_STYLE:-false}
      S3_PUBLIC_BASE_URL: ${STUDIOCORE_STAGING_S3_PUBLIC_BASE_URL:-}
    networks:
      - easypanel
      - easypanel-elcastillo
    ports:
      - "127.0.0.1:${STUDIOCORE_STAGING_API_PORT:-4202}:4102"

  studiocore-web-pruebas:
    build:
      context: ../../studiocore-erp
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${STUDIOCORE_STAGING_VITE_API_BASE_URL:-/erp-api/api/v1}
        VITE_BASE_PATH: ${STUDIOCORE_STAGING_VITE_BASE_PATH:-/erp/}
    container_name: studiocore-web-pruebas
    restart: unless-stopped
    depends_on:
      - studiocore-api-pruebas
    networks:
      - easypanel
      - easypanel-elcastillo
    ports:
      - "127.0.0.1:${STUDIOCORE_STAGING_WEB_PORT:-4301}:80"

networks:
  easypanel:
    external: true
  easypanel-elcastillo:
    external: true
