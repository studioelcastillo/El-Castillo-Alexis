services:
  studiocore-api-produccion:
    build:
      context: ../../studiocore-erp
      dockerfile: apps/api/Dockerfile
    container_name: studiocore-api-produccion
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4102
      API_GLOBAL_PREFIX: ${STUDIOCORE_PRODUCTION_API_GLOBAL_PREFIX:-api/v1}
      API_DOCS_PATH: ${STUDIOCORE_PRODUCTION_API_DOCS_PATH:-docs}
      DATABASE_URL: ${STUDIOCORE_PRODUCTION_DATABASE_URL:?missing STUDIOCORE_PRODUCTION_DATABASE_URL}
      DATABASE_SCHEMA: ${STUDIOCORE_PRODUCTION_DATABASE_SCHEMA:-studiocore_erp}
      REDIS_URL: ${STUDIOCORE_PRODUCTION_REDIS_URL:-redis://localhost:6379}
      JWT_ACCESS_SECRET: ${STUDIOCORE_PRODUCTION_JWT_ACCESS_SECRET:?missing STUDIOCORE_PRODUCTION_JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${STUDIOCORE_PRODUCTION_JWT_REFRESH_SECRET:?missing STUDIOCORE_PRODUCTION_JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${STUDIOCORE_PRODUCTION_JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${STUDIOCORE_PRODUCTION_JWT_REFRESH_TTL:-7d}
      S3_ENDPOINT: ${STUDIOCORE_PRODUCTION_S3_ENDPOINT:-}
      S3_REGION: ${STUDIOCORE_PRODUCTION_S3_REGION:-us-east-1}
      S3_BUCKET: ${STUDIOCORE_PRODUCTION_S3_BUCKET:-el-castillo}
      S3_ACCESS_KEY: ${STUDIOCORE_PRODUCTION_S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${STUDIOCORE_PRODUCTION_S3_SECRET_KEY:-}
      S3_FORCE_PATH_STYLE: ${STUDIOCORE_PRODUCTION_S3_FORCE_PATH_STYLE:-false}
      S3_PUBLIC_BASE_URL: ${STUDIOCORE_PRODUCTION_S3_PUBLIC_BASE_URL:-}
    labels:
      traefik.enable: "true"
      traefik.docker.network: easypanel
      traefik.http.routers.studiocore-api-produccion.rule: Host(`terminado.livstre.com`) && (Path(`/erp-api`) || PathPrefix(`/erp-api/`))
      traefik.http.routers.studiocore-api-produccion.entrypoints: https
      traefik.http.routers.studiocore-api-produccion.tls.certresolver: letsencrypt
      traefik.http.routers.studiocore-api-produccion.priority: "120"
      traefik.http.routers.studiocore-api-produccion.service: studiocore-api-produccion
      traefik.http.routers.studiocore-api-produccion.middlewares: studiocore-api-produccion-strip
      traefik.http.middlewares.studiocore-api-produccion-strip.stripprefix.prefixes: /erp-api
      traefik.http.services.studiocore-api-produccion.loadbalancer.server.port: "4102"
    networks:
      - easypanel
      - easypanel-elcastillo
    ports:
      - "127.0.0.1:${STUDIOCORE_PRODUCTION_API_PORT:-5202}:4102"
    volumes:
      - ../../scripts/scrapers:/app/scripts/scrapers:ro

  studiocore-web-produccion:
    build:
      context: ../../studiocore-erp
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${STUDIOCORE_PRODUCTION_VITE_API_BASE_URL:-/erp-api/api/v1}
        VITE_BASE_PATH: ${STUDIOCORE_PRODUCTION_VITE_BASE_PATH:-/erp/}
    container_name: studiocore-web-produccion
    restart: unless-stopped
    depends_on:
      - studiocore-api-produccion
    labels:
      traefik.enable: "true"
      traefik.docker.network: easypanel
      traefik.http.routers.studiocore-web-produccion.rule: Host(`terminado.livstre.com`) && (Path(`/erp`) || PathPrefix(`/erp/`))
      traefik.http.routers.studiocore-web-produccion.entrypoints: https
      traefik.http.routers.studiocore-web-produccion.tls.certresolver: letsencrypt
      traefik.http.routers.studiocore-web-produccion.priority: "110"
      traefik.http.routers.studiocore-web-produccion.service: studiocore-web-produccion
      traefik.http.routers.studiocore-web-produccion.middlewares: studiocore-web-produccion-strip
      traefik.http.middlewares.studiocore-web-produccion-strip.stripprefix.prefixes: /erp
      traefik.http.services.studiocore-web-produccion.loadbalancer.server.port: "80"
    networks:
      - easypanel
      - easypanel-elcastillo
    ports:
      - "127.0.0.1:${STUDIOCORE_PRODUCTION_WEB_PORT:-5301}:80"

networks:
  easypanel:
    external: true
  easypanel-elcastillo:
    external: true
