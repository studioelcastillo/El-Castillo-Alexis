name: Deploy Production VPS

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret scan
        run: npm run secrets:check

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_DASHBOARD_BASE: /
          DASHBOARD_APP_URL: /
        run: npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          extensions: mbstring, intl, pdo_pgsql, pgsql, zip, gd, bcmath, soap, dom

      - name: Install backend dependencies
        working-directory: backend-legacy
        run: composer install --no-interaction --prefer-dist

      - name: Install StudioCore dependencies
        working-directory: studiocore-erp
        run: npm ci

      - name: StudioCore API lint
        working-directory: studiocore-erp
        run: npm run lint --workspace @studiocore/api

      - name: StudioCore web lint
        working-directory: studiocore-erp
        run: npm run lint --workspace @studiocore/web

      - name: StudioCore API tests
        working-directory: studiocore-erp
        run: npm run test --workspace @studiocore/api

      - name: StudioCore build
        working-directory: studiocore-erp
        run: npm run build

      - name: Prepare backend env
        working-directory: backend-legacy
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Route list
        working-directory: backend-legacy
        run: php artisan route:list

      - name: Backend tests
        working-directory: backend-legacy
        run: php artisan test

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        env:
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          : "${VPS_KNOWN_HOSTS:?Missing VPS_SSH_KNOWN_HOSTS}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy production on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail
          : "${VPS_HOST:?Missing VPS_SSH_HOST}"
          : "${VPS_USER:?Missing VPS_SSH_USER}"
          PORT="22"
          APP_DIR="${VPS_APP_DIR:-/srv/el-castillo}"
          ssh -p "$PORT" "$VPS_USER@$VPS_HOST" "set -euo pipefail; APP_DIR='$APP_DIR'; DEPLOY_DIR=\"\${APP_DIR}-github-deploy\"; if [ ! -d \"\$APP_DIR/.git\" ]; then echo 'Missing git repo in VPS_APP_DIR' >&2; exit 1; fi; rm -rf \"\$DEPLOY_DIR\"; cd \"\$APP_DIR\"; git worktree prune; git fetch origin main; git worktree add -f --detach \"\$DEPLOY_DIR\" origin/main; mkdir -p \"\$DEPLOY_DIR/.secure\"; if [ -d \"\$APP_DIR/.secure\" ]; then cp -a \"\$APP_DIR/.secure/.\" \"\$DEPLOY_DIR/.secure/\"; fi; cd \"\$DEPLOY_DIR\"; if sudo -n true >/dev/null 2>&1; then sudo -n bash deploy/vps/publish.sh production; else bash deploy/vps/publish.sh production; fi; cd \"\$APP_DIR\"; git worktree remove \"\$DEPLOY_DIR\" --force"

      - name: Verify production health
        run: |
          urls=(
            "https://terminado.livstre.com/health"
            "https://terminado.livstre.com/api/app/connectivity"
          )
          for url in "${urls[@]}"; do
            ok=""
            for attempt in $(seq 1 12); do
              if curl -fsS "$url"; then
                ok=1
                break
              fi
              sleep 10
            done
            if [ -z "$ok" ]; then
              echo "Health check failed: $url" >&2
              exit 1
            fi
          done
